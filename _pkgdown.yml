url: https://jllcalorio.github.io/dimsprepr/

template:
  bootstrap: 5
  bootswatch: flatly
  bslib:
    base_font:      {google: "Inter"}
    heading_font:   {google: "Inter"}
    code_font:      {google: "JetBrains Mono"}
    font-size-base: "0.95rem"
    primary:        "#2C6E91"
    secondary:      "#6C757D"
    success:        "#4B8B65"
    info:           "#5B8DB8"
    warning:        "#C97A26"
    danger:         "#B84A4A"
    light:          "#F8F9FA"
    dark:           "#212529"
    navbar-bg:            "#FFFFFF"
    navbar-light-color:   "#343A40"
    pkgdown-navbar-bg:    "#FFFFFF"
    body-bg:              "#FFFFFF"
    body-color:           "#212529"
    border-radius:        "0.375rem"
    link-color:           "#2C6E91"
    link-hover-color:     "#1A4D6B"
  includes:
    in_header: |
      <link rel="preconnect" href="https://fonts.googleapis.com">

# ── Site metadata ────────────────────────────────────────────────────────────
home:
  title: "dimsprepr • Statistical Analysis Made Easier"
  description: >
    An R package for end-to-end preprocessing of 
    direct-injection metabolomics data — missing value filtering, 
    imputation, signal drift and batch correction, normalization, 
    transformation, scaling, and quality filtering — 
    in a single reproducible pipeline.
  links:
    - text: "Report a bug"
      href: https://github.com/jllcalorio/dimsprepr/issues
    - text: "Source on GitHub"
      href: https://github.com/jllcalorio/dimsprepr

# ── Navbar ───────────────────────────────────────────────────────────────────
navbar:
  structure:
    left:  [intro, reference, articles, changelog]
    right: [search, github]

  components:
    intro:
      text: "Get Started"
      href: articles/dimsprepr.html

    github:
      icon: fab fa-github
      href: https://github.com/jllcalorio/dimsprepr
      aria-label: "GitHub"

# ── Reference (function index) ───────────────────────────────────────────────
reference:

  - title: "Direct-Injection Metabolomics Preprocessing Pipeline"
    desc: >
      Function for running a sequential preprocessing pipeline for metabolomics data by
      orchestrating the individual run_* functions of dimsprepr.
    contents:
      - starts_with("run_DIpreprocess")

  - title: "Data Cleaning & Quality Control"
    desc: "Filtering features based on missingness, variance, or RSD thresholds."
    contents:
      - starts_with("run_filtermissing")
      - starts_with("run_filterRSD")
      - starts_with("run_filtervariance")

  - title: "Missing Value Imputation"
    desc: "Addressing missing data using various imputation algorithms."
    contents:
      - starts_with("run_mvimpute")

  - title: "Signal Drift and Batch Effects Correction"
    desc: "Correcting for technical variation and instrument signal drift."
    contents:
      - starts_with("run_driftBatchCorrect")

  - title: "Data Normalization, Transformation, and Scaling"
    desc: "Transforming and scaling data to ensure comparability across samples."
    contents:
      - starts_with("run_normalize")
      - starts_with("run_transform")
      - starts_with("run_scale")

  - title: "Plotting Functions of Two Data Frames"
    desc: "Plots two data frames at a time, can be before and after implementing a method."
    contents:
      - starts_with("plot_beforeafter")
      - starts_with("plot_dist_beforeafter")

  - title: "Other Plotting Functions"
    desc: "Other functions to plot metabolomics and metagenomics data."
    contents:
      - starts_with("plot_meanmap")
      - starts_with("plot_multi_y")
      - starts_with("plot_relabund")

  - title: "Internal functions"
    desc: >
      Internal functions used by dimsprepr.
    contents:
      - has_keyword("internal")

# ── Articles (vignettes) ─────────────────────────────────────────────────────
articles:
  - title: "Introduction"
    navbar: "Introduction"
    contents:
      - starts_with("dimsprepr")
      - starts_with("intro")
      - starts_with("getting-started")

# ── Changelog ────────────────────────────────────────────────────────────────
news:
  releases:
    - text: "Version 1.0"
      href: https://github.com/jllcalorio/dimsprepr/releases/tag/v1.0

# ── Footer ───────────────────────────────────────────────────────────────────
footer:
  structure:
    left: developed_by
    right: built_with

  components:
    developed_by: >
      Developed by [John Lennon L. Calorio](https://github.com/jllcalorio).
    built_with: >
      Built with [pkgdown](https://pkgdown.r-lib.org/).
