# ──────────────────────────────────────────────────────────────────────────────
# pkgdown.yaml
# Automatically builds and deploys the dimsprepr pkgdown site to GitHub Pages
# once per month ONLY if there were commits in the previous 30 days.
# Manual runs are still allowed from the Actions tab.
# ──────────────────────────────────────────────────────────────────────────────

on:
  # Run monthly: midnight UTC on the 1st day of each month
  schedule:
    - cron: '0 0 1 * *'

  # Allow manual runs from the Actions tab
  workflow_dispatch:

name: pkgdown

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Required for GitHub Actions Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.recent_commits.outputs.skip }}
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0
      - name: Check for recent commits
        id: recent_commits
        run: |
          commits=$(git log --since="30 days ago" --oneline | wc -l)
          echo "Commits in last 30 days: $commits"
          if [ "$commits" -eq 0 ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

  pkgdown:
    needs: check
    if: needs.check.outputs.skip == 'false'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      # 1. Check out the repository
      - name: Checkout repository
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      # 2. Set up Pandoc
      - name: Install Pandoc
        uses: r-lib/actions/setup-pandoc@v2.7.1

      # 3. Set up R
      - name: Set up R
        uses: r-lib/actions/setup-r@v2.11.3
        with:
          use-public-rspm: true

      - name: Install system MPI
        run: |
          sudo apt-get update
          sudo apt-get install -y libopenmpi-dev openmpi-bin

      # 4. Install R dependencies
      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2.3.0
        with:
          extra-packages: |
            any::pkgdown
            any::devtools
            any::BiocManager
            bioc::BiocParallel
            bioc::imputeLCMD
            bioc::matrixStats
            bioc::pmp
            bioc::sva
            bioc::vsn
          needs: website

      # 5. Install package
      - name: Install package
        run: Rscript -e 'pak::local_install(".")'

      # 6. Configure GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # 7. Build pkgdown site (outputs to docs/)
      - name: Build site
        run: pkgdown::build_site_github_pages(new_process = FALSE)
        shell: Rscript {0}

      # 8. Upload docs/ as Pages artifact
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      # 9. Deploy
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
